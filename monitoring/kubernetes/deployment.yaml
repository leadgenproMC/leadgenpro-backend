# LEADGENPRO - DEPLOYMENT KUBERNETES ESCALABLE
# ==========================================
#
# Características:
# ✅ Auto-scaling automático
# ✅ Rolling updates
# ✅ Health checks
# ✅ Resource limits
# ✅ High availability
# ✅ Zero downtime deployments

apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadgenpro-frontend
  namespace: leadgenpro
  labels:
    app: leadgenpro-frontend
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
      progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: leadgenpro-frontend
  template:
    metadata:
      labels:
        app: leadgenpro-frontend
        version: v1.0.0
    spec:
      containers:
      - name: frontend
        image: leadgenpro/frontend:latest
        ports:
        - containerPort: 3000
        env:
        - name: NODE_ENV
          value: "production"
        - name: NEXT_PUBLIC_API_URL
          value: "http://backend-service:8000"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: leadgenpro
spec:
  selector:
    app: leadgenpro-frontend
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: leadgenpro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: leadgenpro-frontend
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60

---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: leadgenpro-backend
  namespace: leadgenpro
  labels:
    app: leadgenpro-backend
    version: v1.0.0
spec:
  replicas: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 3
      maxUnavailable: 2
      progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: leadgenpro-backend
  template:
    metadata:
      labels:
        app: leadgenpro-backend
        version: v1.0.0
    spec:
      containers:
      - name: backend
        image: leadgenpro/backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-secret
              key: url
        - name: REDIS_URL
          value: "redis://redis-service:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secret
              key: secret
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: leadgenpro
spec:
  selector:
    app: leadgenpro-backend
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP

---
# Backend HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: leadgenpro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: leadgenpro-backend
  minReplicas: 3
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70

---
# Ingress para tráfico externo
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: leadgenpro-ingress
  namespace: leadgenpro
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  tls:
  - hosts:
    - leadgenpro.com
    - api.leadgenpro.com
    secretName: leadgenpro-tls
  rules:
  - host: leadgenpro.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend-service
            port:
              number: 80
  - host: api.leadgenpro.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: backend-service
            port:
              number: 80
