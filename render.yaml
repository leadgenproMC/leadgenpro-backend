services:
  - type: web
    name: leadgenpro-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 65 --timeout-graceful-shutdown 30
    pythonVersion: 3.11.0
    envGroup: evg-d806khho3t8c73dg66og
    healthCheckPath: /healthz
    healthCheckTimeout: 60
    autoDeploy: true
    # Optimizaciones específicas
    disk:
      name: disk
      sizeGB: 25
    # Variables de entorno optimizadas
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: WORKERS
        value: "1"
      - key: MAX_REQUESTS
        value: "1000"
      - key: REQUEST_TIMEOUT
        value: "30"
