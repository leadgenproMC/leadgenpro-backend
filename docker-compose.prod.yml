# LEADGENPRO - INFRAESTRUCTURA ESCALABLE
# ======================================
# 
# Características:
# ✅ Auto-scaling horizontal
# ✅ Load balancing
# ✅ Cache distribuido
# ✅ Base de datos escalable
# ✅ CDN estático
# ✅ Monitorización
# ✅ Backup automático
# ✅ SSL/TLS automático
# ✅ Health checks

version: '3.8'

services:
  # Frontend optimizado con CDN
  frontend:
    image: leadgenpro/frontend:latest
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend escalable con cache
  backend:
    image: leadgenpro/backend:latest
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/leadgenpro
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_SERVICE_HOST=smtp
      - NODE_ENV=production
    depends_on:
      - postgres
      - redis
      - email-service
    deploy:
      replicas: 5
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Base de datos PostgreSQL escalable
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=leadgenpro
      - POSTGRES_USER=leadgenpro
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_REPLICATION_MODE=on
      - POSTGRES_REPLICATION_USER=replicator
      - POSTGRES_REPLICATION_PASSWORD=${REPLICA_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '1.0'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadgenpro"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cache Redis distribuido
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --replica-announce-ip redis
    volumes:
      - redis_data:/data
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Servicio de email dedicado
  email-service:
    image: leadgenpro/email-service:latest
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - QUEUE_NAME=email_queue
    depends_on:
      - redis
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Load balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitorización
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # Visualización de métricas
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  leadgenpro-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# Configuración de auto-scaling
x-scaling:
  frontend:
    min_instances: 2
    max_instances: 10
    target_cpu_percent: 70
    target_memory_percent: 80
    scale_up_cooldown: 60s
    scale_down_cooldown: 120s
  
  backend:
    min_instances: 3
    max_instances: 20
    target_cpu_percent: 60
    target_memory_percent: 70
    scale_up_cooldown: 30s
    scale_down_cooldown: 60s
  
  postgres:
    min_instances: 1
    max_instances: 3
    target_cpu_percent: 80
    target_memory_percent: 85
    scale_up_cooldown: 300s
    scale_down_cooldown: 600s
